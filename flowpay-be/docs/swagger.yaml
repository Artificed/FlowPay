basePath: /api/v1
definitions:
  handler.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  handler.registerRequest:
    properties:
      display_name:
        type: string
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - display_name
    - email
    - password
    type: object
  handler.transferRequest:
    properties:
      amount:
        type: integer
      currency:
        type: string
      note:
        type: string
      recipient_wallet_id:
        type: string
    required:
    - amount
    - currency
    - recipient_wallet_id
    type: object
  models.Transaction:
    properties:
      amount:
        type: integer
      created_at:
        type: string
      currency:
        type: string
      id:
        type: string
      note:
        type: string
      recipient_wallet_id:
        type: string
      recipientWallet:
        $ref: '#/definitions/models.Wallet'
      reference_code:
        description: '"FP-20260317-0042"'
        type: string
      sender_wallet_id:
        type: string
      senderWallet:
        $ref: '#/definitions/models.Wallet'
      status:
        $ref: '#/definitions/models.TransactionStatus'
      updated_at:
        type: string
    type: object
  models.TransactionStatus:
    enum:
    - pending
    - processing
    - completed
    - failed
    - reversed
    type: string
    x-enum-varnames:
    - TransactionStatusPending
    - TransactionStatusProcessing
    - TransactionStatusCompleted
    - TransactionStatusFailed
    - TransactionStatusReversed
  models.User:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      display_name:
        type: string
      email:
        type: string
      id:
        type: string
      updated_at:
        type: string
      wallet:
        $ref: '#/definitions/models.Wallet'
    type: object
  models.Wallet:
    properties:
      balances:
        items:
          $ref: '#/definitions/models.WalletBalance'
        type: array
      created_at:
        type: string
      id:
        type: string
      status:
        $ref: '#/definitions/models.WalletStatus'
      updated_at:
        type: string
      user:
        $ref: '#/definitions/models.User'
      user_id:
        type: string
    type: object
  models.WalletBalance:
    properties:
      available_amount:
        type: integer
      created_at:
        type: string
      currency:
        description: ISO 4217
        type: string
      id:
        type: string
      total_amount:
        type: integer
      updated_at:
        type: string
      wallet:
        $ref: '#/definitions/models.Wallet'
      wallet_id:
        type: string
    type: object
  models.WalletStatus:
    enum:
    - active
    - suspended
    - closed
    type: string
    x-enum-varnames:
    - WalletStatusActive
    - WalletStatusSuspended
    - WalletStatusClosed
  service.AuthResult:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/models.User'
    type: object
host: localhost:8080
info:
  contact: {}
  description: FlowPay payment platform API
  title: FlowPay API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/service.AuthResult'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Registration details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.registerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/service.AuthResult'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new user
      tags:
      - auth
  /transfers:
    get:
      parameters:
      - description: Page size (default 20)
        in: query
        name: limit
        type: integer
      - description: Offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Transaction'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List transactions for current user
      tags:
      - transfers
    post:
      consumes:
      - application/json
      parameters:
      - description: Transfer details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.transferRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Transaction'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Send money to another wallet
      tags:
      - transfers
  /transfers/{id}:
    get:
      parameters:
      - description: Transaction ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Transaction'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get a transaction by ID
      tags:
      - transfers
  /wallet:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Wallet'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get current user's wallet and balances
      tags:
      - wallet
securityDefinitions:
  BearerAuth:
    description: 'Enter: **Bearer &lt;your token&gt;**'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
