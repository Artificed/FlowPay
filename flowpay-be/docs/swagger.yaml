basePath: /api
definitions:
  currency.Currency:
    properties:
      code:
        type: string
      name:
        type: string
    type: object
  handler.createScheduledPaymentRequest:
    properties:
      amount:
        type: integer
      currency:
        type: string
      first_run_at:
        type: string
      interval_days:
        type: integer
      note:
        type: string
      recipient_wallet_id:
        type: string
    required:
    - amount
    - currency
    - first_run_at
    - interval_days
    - recipient_wallet_id
    type: object
  handler.depositRequest:
    properties:
      amount:
        type: integer
      currency:
        type: string
    required:
    - amount
    - currency
    type: object
  handler.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  handler.registerRequest:
    properties:
      display_name:
        type: string
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - display_name
    - email
    - password
    type: object
  handler.transferRequest:
    properties:
      amount:
        type: integer
      currency:
        type: string
      note:
        type: string
      recipient_wallet_id:
        type: string
    required:
    - amount
    - currency
    - recipient_wallet_id
    type: object
  models.ScheduledPayment:
    properties:
      amount:
        type: integer
      created_at:
        type: string
      currency:
        type: string
      id:
        type: string
      interval_days:
        type: integer
      next_run_at:
        type: string
      note:
        type: string
      recipient_wallet_id:
        type: string
      status:
        $ref: '#/definitions/models.ScheduledPaymentStatus'
      updated_at:
        type: string
      user_id:
        type: string
      workflow_id:
        type: string
    type: object
  models.ScheduledPaymentStatus:
    enum:
    - active
    - cancelled
    type: string
    x-enum-varnames:
    - ScheduledPaymentStatusActive
    - ScheduledPaymentStatusCancelled
  models.Transaction:
    properties:
      amount:
        type: integer
      correlation_id:
        type: string
      created_at:
        type: string
      currency:
        type: string
      id:
        type: string
      note:
        type: string
      recipient_wallet_id:
        type: string
      reference_code:
        type: string
      sender_wallet_id:
        type: string
      status:
        $ref: '#/definitions/models.TransactionStatus'
      type:
        $ref: '#/definitions/models.TransactionType'
      updated_at:
        type: string
    type: object
  models.TransactionStatus:
    enum:
    - pending
    - processing
    - completed
    - failed
    - reversed
    type: string
    x-enum-varnames:
    - TransactionStatusPending
    - TransactionStatusProcessing
    - TransactionStatusCompleted
    - TransactionStatusFailed
    - TransactionStatusReversed
  models.TransactionType:
    enum:
    - transfer
    - deposit
    type: string
    x-enum-varnames:
    - TransactionTypeTransfer
    - TransactionTypeDeposit
  models.User:
    properties:
      created_at:
        type: string
      display_name:
        type: string
      email:
        type: string
      id:
        type: string
      updated_at:
        type: string
      wallet:
        $ref: '#/definitions/models.Wallet'
    type: object
  models.Wallet:
    properties:
      balances:
        items:
          $ref: '#/definitions/models.WalletBalance'
        type: array
      created_at:
        type: string
      id:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  models.WalletBalance:
    properties:
      available_amount:
        type: integer
      created_at:
        type: string
      currency:
        description: ISO 4217
        type: string
      id:
        type: string
      total_amount:
        type: integer
      updated_at:
        type: string
      wallet_id:
        type: string
    type: object
  service.AuthResult:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/models.User'
    type: object
host: localhost:8080
info:
  contact: {}
  description: FlowPay payment platform API
  title: FlowPay API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/service.AuthResult'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Registration details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.registerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/service.AuthResult'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new user
      tags:
      - auth
  /currencies:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/currency.Currency'
            type: array
      summary: List supported currencies
      tags:
      - wallet
  /health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - health
  /scheduled-payments:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List scheduled payments for current user
      tags:
      - scheduled-payments
    post:
      consumes:
      - application/json
      parameters:
      - description: Scheduled payment details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.createScheduledPaymentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.ScheduledPayment'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a recurring scheduled payment
      tags:
      - scheduled-payments
  /scheduled-payments/{id}:
    delete:
      parameters:
      - description: Scheduled Payment ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Cancel a scheduled payment
      tags:
      - scheduled-payments
  /transfers:
    get:
      parameters:
      - description: Page size (default 10, max 100)
        in: query
        name: limit
        type: integer
      - description: Offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List transactions for current user
      tags:
      - transfers
    post:
      consumes:
      - application/json
      parameters:
      - description: Transfer details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.transferRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Transaction'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Send money to another wallet
      tags:
      - transfers
  /transfers/{id}:
    get:
      parameters:
      - description: Transaction ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Transaction'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get a transaction by ID
      tags:
      - transfers
  /transfers/{id}/reverse:
    post:
      parameters:
      - description: Transaction ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Transaction'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Reverse a completed transfer
      tags:
      - transfers
  /transfers/stream:
    get:
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Stream transaction updates via SSE
      tags:
      - transfers
  /wallet:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Wallet'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get current user's wallet and balances
      tags:
      - wallet
  /wallet/deposit:
    post:
      consumes:
      - application/json
      parameters:
      - description: Deposit details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.depositRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.WalletBalance'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Add funds to wallet
      tags:
      - wallet
securityDefinitions:
  BearerAuth:
    description: 'Enter: **Bearer &lt;your token&gt;**'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
